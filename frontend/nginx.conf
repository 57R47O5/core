# -------------------------------
# Landing - agora.logosoft.com.py
# -------------------------------
server {
    listen 443 ssl;
    server_name agora.logosoft.com.py;

    ssl_certificate /etc/letsencrypt/live/logosoft.com.py-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logosoft.com.py-0001/privkey.pem;

    location / {
        proxy_pass http://landing:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 80;
    server_name agora.logosoft.com.py;
    return 301 https://$host$request_uri;
}

# -------------------------------
# Demo - demo.logosoft.com.py
# -------------------------------
server {
    listen 443 ssl;
    server_name demo.logosoft.com.py;

    ssl_certificate /etc/letsencrypt/live/logosoft.com.py-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logosoft.com.py-0001/privkey.pem;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name demo.logosoft.com.py;
    return 301 https://$host$request_uri;
}