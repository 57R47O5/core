server {
    listen 443 ssl;
    server_name logosoft.com.py www.logosoft.com.py;

    ssl_certificate /etc/letsencrypt/live/logosoft.com.py/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/logosoft.com.py/privkey.pem;

    return 301 https://$host$request_uri;

    # React (SPA)
    location / {
        proxy_pass http://logos-frontend:3000/;
        root /usr/share/nginx/html;
        index index.html;
        # Busca archivo o carpeta, si no existe devuelve index.html
        try_files $uri $uri/ /index.html;
    }

    # API Django
    location /api/ {
        proxy_pass http://logos-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}